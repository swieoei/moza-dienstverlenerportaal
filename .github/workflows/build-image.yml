name: Build, push and deploy container image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Rolt de zojuist gebouwde image automatisch uit naar ZAD (dienstverlener-moza.rijksapp.dev).
  # Het project-id staat hier vast, zodat een release nooit per ongeluk op een ander
  # ZAD-project kan landen. Vereist het repo-secret ZAD_API_KEY (API key van project mozad-dle).
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to ZAD
        uses: RijksICTGilde/zad-actions/deploy@v4
        with:
          api-key: ${{ secrets.ZAD_API_KEY }}
          project-id: mozad-dle
          deployment-name: portaal-poc
          component: frontend
          image: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          wait-for-ready: 'true'
