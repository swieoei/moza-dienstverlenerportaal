<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSO Rijk - Kamer van Koophandel</title>

  <!-- Echte NLDD design system -->
  <link rel="stylesheet" href="https://esm.sh/@nldd/design-system@0.8.60/dist/css/settings.css" />
  <script type="module" src="https://esm.sh/@nldd/design-system@0.8.60"></script>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body { font-family: var(--typography-font-family-base, system-ui, sans-serif); background: var(--context-base-background-color, #fff); }
    #app { display: flex; flex-direction: column; height: 100vh; }
    nldd-app-view { flex: 1 1 auto; min-height: 0; }
    .auth-center { display: flex; justify-content: center; align-items: flex-start; padding: 48px 16px; }
    .auth-card { width: 100%; max-width: 440px; }
    .full > nldd-button { display: block; }
    .quick { display: flex; flex-direction: column; gap: 8px; }
    .quick nldd-button { display: block; }
    .muted { text-align: center; color: var(--context-muted-foreground-color, #5a5a5a); font-size: 0.85rem; }
  </style>
</head>
<body>
  <div id="app">

    <!-- SSO Rijk: centrale inlogdienst. Organisatietitel = Kamer van Koophandel -->
    <nldd-top-navigation-bar
      logo-title="Rijksoverheid"
      logo-subtitle="SSO Rijk"
      website-title="Single Sign-On Rijk">
    </nldd-top-navigation-bar>

    <nldd-app-view background="tinted">
      <nldd-page>
        <nldd-simple-section>
          <div class="auth-center">
            <nldd-card class="auth-card">
              <nldd-container padding="24" gap="16">

                <nldd-title size="2">
                  <p slot="overline">Inloggen bij</p>
                  <h1 id="org-titel">Ministerie van BZK</h1>
                  <p slot="subtitle">Log in met uw Rijksaccount om door te gaan.</p>
                </nldd-title>

                <nldd-divider></nldd-divider>

                <nldd-form-field label="Gebruikersnaam of e-mailadres">
                  <nldd-text-field id="u" placeholder="naam@organisatie.nl"></nldd-text-field>
                </nldd-form-field>
                <nldd-form-field label="Wachtwoord">
                  <nldd-password-field id="p"></nldd-password-field>
                </nldd-form-field>

                <div class="full">
                  <nldd-button id="login-btn" variant="primary" size="lg" end-icon="arrow-right" text="Inloggen"></nldd-button>
                </div>

                <nldd-divider></nldd-divider>
                <nldd-rich-text><p class="muted">Demo: snel inloggen als</p></nldd-rich-text>
                <div class="full quick">
                  <nldd-button class="qbtn" data-user="robbert" variant="secondary" start-icon="person" text="Robbert Bos · Ministerie van BZK"></nldd-button>
                  <nldd-button class="qbtn" data-user="sanne" variant="secondary" start-icon="person" text="Sanne de Boer · Kamer van Koophandel"></nldd-button>
                </div>

                <nldd-rich-text><p class="muted">Wachtwoord vergeten? Neem contact op met uw lokale beheerder.</p></nldd-rich-text>

              </nldd-container>
            </nldd-card>
          </div>
        </nldd-simple-section>
      </nldd-page>
    </nldd-app-view>
  </div>

  <script>
    // Twee demo-accounts: Robbert Bos (BZK) en Sanne de Boer (KvK). Beide organisatie-
    // beheerders met dezelfde rechten. De keuze wordt doorgegeven aan het portaal.
    const USERS = {
      'sanne.deboer@kvk.nl': { key: 'sanne', org: 'Kamer van Koophandel' },
      'robbert.bos@rijksoverheid.nl': { key: 'robbert', org: 'Ministerie van BZK' },
    };
    const KEY_EMAIL = { sanne: 'sanne.deboer@kvk.nl', robbert: 'Robbert.Bos@rijksoverheid.nl' };
    const uVeld = document.getElementById('u');
    const orgTitel = document.getElementById('org-titel');

    function huidigeUser() { return USERS[((uVeld.value || '') + '').trim().toLowerCase()] || null; }
    function werkOrgBij() { const m = huidigeUser(); if (orgTitel) orgTitel.textContent = m ? m.org : 'SSO Rijk'; }
    function login(email) {
      const m = USERS[(email || '').trim().toLowerCase()];
      try { localStorage.setItem('moza-user', m ? m.key : 'sanne'); } catch (e) {}
      window.location.href = 'index.html';
    }

    document.getElementById('login-btn').addEventListener('click', () => login(uVeld.value));
    document.querySelectorAll('.qbtn').forEach(b =>
      b.addEventListener('click', () => login(KEY_EMAIL[b.dataset.user])));

    // Demo-gemak: Robbert (BZK) staat standaard ingevuld; org-titel volgt de invoer.
    customElements.whenDefined('nldd-text-field').then(() => {
      if (uVeld) { uVeld.value = 'Robbert.Bos@rijksoverheid.nl'; werkOrgBij(); }
    });
    if (uVeld) uVeld.addEventListener('input', werkOrgBij);
  </script>
</body>
</html>
