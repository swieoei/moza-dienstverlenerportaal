# Vervangt de default server-config van nginx-unprivileged (luistert op 8080).
# Belangrijkste afwijking: Cache-Control "no-cache" zodat browsers de pagina's
# altijd revalideren (via ETag/Last-Modified) en nooit een verouderde — of bij
# een routeringsincident zelfs verkeerde — index uit hun cache blijven tonen.
server {
    listen       8080;
    server_name  localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
