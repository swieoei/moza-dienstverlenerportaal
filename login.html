<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inloggen — MijnOverheid - Dienstverleners</title>

  <!-- Echte NLDD design system -->
  <link rel="stylesheet" href="https://esm.sh/@nldd/design-system@0.8.60/dist/css/settings.css" />
  <script type="module" src="https://esm.sh/@nldd/design-system@0.8.60"></script>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body { font-family: var(--typography-font-family-base, system-ui, sans-serif); background: var(--context-base-background-color, #fff); }
    #app { display: flex; flex-direction: column; height: 100vh; }
    nldd-app-view { flex: 1 1 auto; min-height: 0; }
    .auth-center { display: flex; justify-content: center; align-items: flex-start; padding: 48px 16px; }
    .auth-card { width: 100%; max-width: 420px; }
    .full > nldd-button, nldd-button.full { display: block; }
    .center-text { text-align: center; }
    .divider-label { text-align: center; color: var(--context-muted-foreground-color, #5a5a5a); font-size: 0.85rem; }
  </style>
</head>
<body>
  <div id="app">

    <nldd-top-navigation-bar
      logo-title="Rijksoverheid"
      logo-subtitle="RIG Cluster"
      website-title="MijnOverheid - Dienstverleners">
    </nldd-top-navigation-bar>

    <nldd-app-view background="tinted">
      <nldd-page>
        <nldd-simple-section>
          <div class="auth-center">
            <nldd-card class="auth-card">
              <nldd-container padding="24" gap="16">

                <nldd-title size="3">
                  <h1>Inloggen bij uw account</h1>
                  <p slot="subtitle">MijnOverheid - Dienstverleners</p>
                </nldd-title>

                <!-- DE blauwe SSO-knop: leidt naar de centrale inlogdienst van de overheid -->
                <div class="full">
                  <nldd-button id="sso-btn" variant="primary" size="lg" end-icon="arrow-right" text="Inloggen met SSO Rijk"></nldd-button>
                </div>
                <nldd-rich-text>
                  <p class="divider-label">U wordt doorgestuurd naar de centrale inlogdienst van de overheid.</p>
                </nldd-rich-text>

                <nldd-divider></nldd-divider>
                <nldd-rich-text><p class="divider-label">Of log in met gebruikersnaam</p></nldd-rich-text>

                <nldd-form-field label="Gebruikersnaam">
                  <nldd-text-field></nldd-text-field>
                </nldd-form-field>
                <nldd-form-field label="Wachtwoord">
                  <nldd-password-field></nldd-password-field>
                </nldd-form-field>
                <div class="full">
                  <nldd-button variant="secondary" text="Inloggen"></nldd-button>
                </div>

              </nldd-container>
            </nldd-card>
          </div>
        </nldd-simple-section>
      </nldd-page>
    </nldd-app-view>
  </div>

  <script>
    // Blauwe knop → centrale overheids-inlogdienst (SSO Rijk).
    document.getElementById('sso-btn').addEventListener('click', () => {
      window.location.href = 'sso.html';
    });
  </script>
</body>
</html>
